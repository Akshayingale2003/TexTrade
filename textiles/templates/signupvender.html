{% extends 'navigation.html' %}
{% block body %}
{% load static %}

<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.95);
        --main-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    body {
        background-color: #f8f9fa;
    }

    .vendor-signup-container {
        max-width: 850px;
        margin: 40px auto;
        background: var(--glass-bg);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        border: 1px solid rgba(0,0,0,0.05);
        backdrop-filter: blur(10px);
    }

    .signup-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .signup-header h2 {
        font-weight: 800;
        background: var(--main-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-group label {
        font-weight: 700;
        color: #636e72;
        font-size: 14px;
        margin-bottom: 8px;
        margin-left: 5px;
    }

    .form-control {
        border-radius: 12px !important;
        padding: 12px 15px !important;
        border: 1px solid #dfe6e9 !important;
        background: #ffffff !important;
        transition: 0.3s;
    }

    .form-control:focus {
        border-color: #6c5ce7 !important;
        box-shadow: 0 0 0 0.2rem rgba(108, 92, 231, 0.1) !important;
    }

    .btn-submit {
        background: var(--main-gradient);
        color: white !important;
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-weight: 700;
        font-size: 16px;
        width: 100%;
        margin-top: 20px;
        transition: 0.3s;
        box-shadow: 0 8px 15px rgba(108, 92, 231, 0.2);
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 20px rgba(108, 92, 231, 0.3);
    }

    .vendor-badge {
        background: rgba(108, 92, 231, 0.1);
        color: #6c5ce7;
        padding: 5px 15px;
        border-radius: 50px;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 10px;
        display: inline-block;
    }
</style>

<div class="container">
    <div class="vendor-signup-container">
        <div class="signup-header">
            <span class="vendor-badge">Partner Portal</span>
            <h2>Vendor Registration</h2>
            <p class="text-muted">Start selling your products on texTrade</p>
        </div>

        <form method="POST" action="" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="fname">First Name</label>
                    <input type="text" class="form-control" placeholder="Enter First Name" name="fname" id="fname" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="lname">Last Name</label>
                    <input type="text" class="form-control" name="lname" placeholder="Enter Last Name" id="lname" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="uname">Username</label>
                    <input type="text" class="form-control" name="uname" placeholder="Enter Username" id="uname" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="pwd">Password</label>
                    <input type="password" class="form-control" placeholder="Enter Password" name="pwd" id="pwd" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="email">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="Enter Email" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="contact">Contact Number</label>
                    <input type="text" class="form-control" id="contact" placeholder="Enter Contact Number" name="contact" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="add">Full Address</label>
                    <input type="text" class="form-control" id="add" placeholder="Enter Shop/Business Address" name="add" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="img">Profile Image </label>
                    <input type="file" class="form-control-file p-1" id="img" name="img" style="border:1px solid #dfe6e9; border-radius:12px; width:100%" required>
                </div>
            </div>

            <button type="submit" class="btn btn-submit">
                <i class="fas fa-store mr-2"></i> Create Vendor Account
            </button>

            <div class="text-center mt-3">
                <small class="text-muted">Already a partner? <a href="{% url 'loginvender' %}" style="color: #6c5ce7; font-weight: 700;">Vendor Login</a></small>
            </div>
        </form>
    </div>
</div>

{% if error is not None %}
    <script>
        alert("{{ error }}");
    </script>
{% endif %}

{% if success %}
    <script>
        alert("Registered Successfully!");
        window.location.href = "{% url 'loginvender' %}";
    </script>
{% endif %}

{% endblock %}
