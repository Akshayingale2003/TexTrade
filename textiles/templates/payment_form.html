<form method="POST">
    {% csrf_token %}
    <label>Enter Amount:</label>
    <input type="number" name="amount" required>
    <button type="submit">Proceed to Pay</button>
</form>
{% extends 'navigation.html' %}
{% block body %}
<style>
    .payment-card {
        max-width: 500px;
        margin: 80px auto;
        background: var(--glass-bg);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        border: 1px solid rgba(255,255,255,0.3);
        backdrop-filter: blur(10px);
    }

    .payment-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .payment-header i {
        font-size: 50px;
        background: var(--main-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 15px;
    }

    .form-group label {
        font-weight: 600;
        color: #555;
        margin-left: 5px;
    }

    .amount-input {
        border-radius: 12px !important;
        padding: 25px 15px !important;
        font-size: 1.2rem !important;
        font-weight: 700 !important;
        border: 2px solid #eee !important;
        transition: 0.3s;
    }

    .amount-input:focus {
        border-color: #6c5ce7 !important;
        box-shadow: 0 0 0 0.2rem rgba(108, 92, 231, 0.1) !important;
    }

    .btn-pay {
        background: var(--main-gradient);
        color: white !important;
        border: none;
        border-radius: 12px;
        padding: 15px;
        font-weight: 700;
        font-size: 16px;
        width: 100%;
        margin-top: 20px;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
    }

    .btn-pay:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
    }
</style>

<div class="container">
    <div class="payment-card">
        <div class="payment-header">
            <i class="fas fa-credit-card"></i>
            <h3>Secure Checkout</h3>
            <p class="text-muted">Enter the amount to proceed with your transaction</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Enter Amount (₹)</label>
                <div class="input-group">
                    <input type="number" 
                           name="amount" 
                           class="form-control amount-input" 
                           placeholder="0.00" 
                           step="0.01" 
                           required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-pay">
                Proceed to Pay <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </form>

        <div class="mt-4 text-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Visa_2014_logo_detail.svg/2560px-Visa_2014_logo_detail.svg.png" height="20" class="mr-2">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Mastercard-logo.svg/1280px-Mastercard-logo.svg.png" height="20" class="mr-2">
            <p class="small text-muted mt-2"><i class="fas fa-lock"></i> SSL Encrypted Payment</p>
        </div>
    </div>
</div>
{% endblock %}
