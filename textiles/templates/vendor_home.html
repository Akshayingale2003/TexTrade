{% extends 'navigation.html' %}
{% load static %}
{% block body %}

<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.95);
        --main-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    body {
        background-color: #f8f9fa;
    }

    /* Welcome Section */
    .welcome-banner {
        padding: 60px 20px;
        text-align: center;
        background: var(--glass-bg);
        border-radius: 24px;
        margin-top: 40px;
        margin-bottom: 40px;
        border: 1px solid rgba(0,0,0,0.05);
        box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    }

    .welcome-banner h1 {
        font-weight: 800;
        background: var(--main-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 3.5rem;
        margin-bottom: 10px;
    }

    /* Stats Cards */
    .stat-card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        text-align: center;
        transition: all 0.3s ease;
        border: 1px solid #f1f2f6;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-decoration: none !important;
    }

    .stat-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(108, 92, 231, 0.15);
        border-color: #6c5ce7;
    }

    .stat-icon {
        font-size: 40px;
        margin-bottom: 15px;
        background: var(--main-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .stat-number {
        font-size: 2.5rem;
        font-weight: 800;
        color: #2d3436;
        display: block;
    }

    .stat-label {
        font-size: 14px;
        font-weight: 700;
        color: #636e72;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .divider {
        width: 60px;
        height: 4px;
        background: var(--main-gradient);
        margin: 20px auto;
        border-radius: 10px;
    }
</style>

<div class="container">
    <div class="welcome-banner">
        <p class="text-muted font-weight-bold mb-1">DASHBOARD OVERVIEW</p>
        <h1>Welcome, Partner!</h1>
        <div class="divider"></div>
        <p class="lead text-secondary">Manage your inventory, track orders, and grow your business with texTrade.</p>
    </div>

    <div class="row mb-5">
        <div class="col-md-4 mb-4">
            <a href="{% url 'vendor_view_product' %}" class="stat-card">
                <div class="stat-icon"><i class="fas fa-boxes"></i></div>
                <span class="stat-number">{{num1}}</span>
                <span class="stat-label">Total Products</span>
            </a>
        </div>

        <div class="col-md-4 mb-4">
            <a href="{% url 'view_orders_vendor' %}" class="stat-card">
                <div class="stat-icon"><i class="fas fa-shopping-bag"></i></div>
                <span class="stat-number">{{num2}}</span>
                <span class="stat-label">Total Orders</span>
            </a>
        </div>

        <div class="col-md-4 mb-4">
            <a href="{% url 'add_product' %}" class="stat-card">
                <div class="stat-icon"><i class="fas fa-plus-circle"></i></div>
                <span class="stat-number">+</span>
                <span class="stat-label">Add New Product</span>
            </a>
        </div>
    </div>
</div>

{% endblock %}
