{% extends 'navigation.html' %}
{% block body %}
{% load static %}

<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.95);
        --main-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    body {
        background-color: #f8f9fa;
    }

    .category-container {
        background: var(--glass-bg);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        border: 1px solid rgba(0,0,0,0.05);
        margin-top: 40px;
        margin-bottom: 40px;
        backdrop-filter: blur(10px);
    }

    .page-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .page-header h2 {
        font-weight: 800;
        background: var(--main-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* Table Styling */
    .custom-table {
        border-collapse: separate;
        border-spacing: 0 10px;
        width: 100%;
    }

    .custom-table thead th {
        background: transparent;
        border: none;
        color: #636e72;
        text-transform: uppercase;
        font-size: 13px;
        font-weight: 700;
        padding: 15px;
    }

    .custom-table tbody tr {
        background: white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        transition: 0.3s;
    }

    .custom-table tbody tr:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(108, 92, 231, 0.1);
    }

    .custom-table td {
        vertical-align: middle;
        padding: 18px 15px;
        border: none;
        color: #2d3436;
        font-weight: 600;
    }

    .custom-table td:first-child { border-radius: 15px 0 0 15px; }
    .custom-table td:last-child { border-radius: 0 15px 15px 0; }

    .btn-edit {
        background: #00b894;
        color: white !important;
        border: none;
        border-radius: 10px;
        padding: 8px 20px;
        font-weight: 700;
        transition: 0.3s;
        font-size: 14px;
    }

    .btn-delete {
        background: #ff7675;
        color: white !important;
        border: none;
        border-radius: 10px;
        padding: 8px 20px;
        font-weight: 700;
        transition: 0.3s;
        font-size: 14px;
    }

    .btn-edit:hover, .btn-delete:hover {
        opacity: 0.9;
        transform: scale(1.05);
    }

    .category-icon {
        color: #6c5ce7;
        margin-right: 10px;
    }
</style>

<div class="container">
    <div class="category-container">
        <div class="page-header">
            <h2>Category Management</h2>
            <p class="text-muted">Manage your product classifications</p>
        </div>

        <div class="table-responsive">
            <table class="table custom-table" id="myTable">
                <thead>
                    <tr>
                        <th><i class="fas fa-tag mr-2"></i> Category Name</th>
                        <th class="text-center">Edit</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in pro %}
                    <tr>
                        <td>
                            <i class="fas fa-folder-open category-icon"></i>
                            {{i.name}}
                        </td>
                        
                        <td class="text-center">
                            <a href="{% url 'edit_category' i.id %}">
                                <button class="btn-edit">
                                    <i class="fas fa-edit mr-1"></i> Edit
                                </button>
                            </a>
                        </td>
                        <td class="text-center">
                            <a href="{% url 'delete_category' i.id %}" onclick="return confirm('Are you sure you want to delete this category?')">
                                <button class="btn-delete">
                                    <i class="fas fa-trash-alt mr-1"></i> Delete
                                </button>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        
        <div class="mt-3 text-right">
            <span class="badge badge-light p-2 px-3 border">Total Categories: {{count}}</span>
        </div>
    </div>
</div>

<script>
    var el_up = document.getElementById("GFG_UP");
    if(el_up) {
        el_up.innerHTML = "Click on the LINK for further confirmation.";
    }
</script>

{% if error %}
<script>
    alert('Category Deleted Successfully');
    window.location.href = "{% url 'view_category' %}"; 
</script>
{% endif %}

{% endblock %}
