{% extends 'navigation.html' %}
{% load static %}
{% block body %}

<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.95);
        --main-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --admin-accent: #6c5ce7;
    }

    body {
        background-color: #f8f9fa;
        font-family: 'Poppins', sans-serif;
    }

    .edit-card {
        background: var(--glass-bg);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        border: 1px solid rgba(0,0,0,0.05);
        margin-top: 50px;
        margin-bottom: 50px;
        backdrop-filter: blur(10px);
    }

    .section-title {
        font-weight: 800;
        background: var(--main-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 30px;
        text-align: center;
    }

    /* Image Preview Styling */
    .profile-preview-wrapper {
        text-align: center;
        margin-bottom: 30px;
    }

    .img-preview {
        width: 130px;
        height: 130px;
        border-radius: 30px; /* Squircle for Admin */
        object-fit: cover;
        border: 4px solid white;
        box-shadow: 0 10px 20px rgba(108, 92, 231, 0.15);
        margin-bottom: 15px;
    }

    .form-label {
        font-weight: 700;
        color: #636e72;
        font-size: 13px;
        text-transform: uppercase;
        margin-bottom: 8px;
        display: block;
    }

    .form-control {
        border-radius: 12px;
        padding: 12px 15px;
        border: 1px solid #dfe6e9;
        background: #fdfdff;
        transition: 0.3s;
    }

    .form-control:focus {
        border-color: var(--admin-accent);
        box-shadow: 0 0 0 0.2rem rgba(108, 92, 231, 0.1);
    }

    .btn-save {
        background: var(--main-gradient);
        color: white !important;
        border: none;
        border-radius: 12px;
        padding: 15px;
        font-weight: 700;
        text-transform: uppercase;
        width: 100%;
        margin-top: 20px;
        transition: 0.3s;
    }

    .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
    }
</style>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="edit-card">
                <h2 class="section-title">Update Admin Profile</h2>
                
                <form method="post" action="" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="profile-preview-wrapper">
                        {% if pro.image %}
                            <img src="{{ pro.image.url }}" id="imgView" class="img-preview">
                        {% else %}
                            <img src="{% static 'images/admin-default.png' %}" id="imgView" class="img-preview">
                        {% endif %}
                        <div class="col-md-6 mx-auto">
                            <label class="form-label">Change Profile Photo</label>
                            <input type="file" name="image" class="form-control" onchange="previewImage(event)">
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-12 mb-3">
                         <label class="form-label">User Name</label>
                            <input type="text" name="uname" class="form-control" value="{{ pro.user.username }}" required>
                         </div>    
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" name="fname" class="form-control" value="{{ pro.user.first_name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" name="lname" class="form-control" value="{{ pro.user.last_name }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contact Number</label>
                        <input type="text" name="contact" class="form-control" value="{{ pro.contact }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address / Office Location</label>
                        <textarea name="address" class="form-control" rows="3" required>{{ pro.address }}</textarea>
                    </div>

                    <div class="row mt-4">
                        <div class="col-md-6 mb-2">
                            <a href="{% url 'admin_profile' %}" class="btn btn-block btn-light" style="border-radius: 12px; padding: 15px; font-weight: 700;">CANCEL</a>
                        </div>
                        <div class="col-md-6">
                            <button type="submit" class="btn-save" style="margin-top:0;">SAVE CHANGES</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    {% if error %}
        alert('Profile updated successfully!');
    {% endif %}

    function previewImage(event) {
        var reader = new FileReader();
        reader.onload = function(){
            var output = document.getElementById('imgView');
            output.src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>

{% endblock %}
