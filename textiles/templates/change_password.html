{% extends 'navigation.html' %}
{% block body %}
{% load static %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
    body {
        background-color: #f4f7f6;
        font-family: 'Poppins', sans-serif;
    }

    .pw-wrapper {
        margin-top: 80px;
        margin-bottom: 60px;
    }

    .pw-card {
        background: #ffffff;
        border-radius: 20px;
        border: none;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        padding: 40px;
        transition: 0.3s;
    }

    .pw-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .pw-icon-box {
        width: 80px;
        height: 80px;
        background: rgba(230, 18, 14, 0.1);
        color: #E6120E;
        font-size: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        margin: 0 auto 20px;
    }

    .pw-title {
        font-weight: 700;
        color: #2d3436;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
    }

    .form-group label {
        font-weight: 600;
        color: #636e72;
        font-size: 0.9rem;
        margin-bottom: 8px;
    }

    .form-control-pw {
        border-radius: 12px;
        padding: 14px 15px;
        border: 2px solid #f1f1f1;
        transition: 0.3s;
        background-color: #fdfdfd;
    }

    .form-control-pw:focus {
        border-color: #E6120E;
        box-shadow: 0 0 0 0.2rem rgba(230, 18, 14, 0.1);
        background-color: #fff;
    }

    .btn-update {
        background: linear-gradient(135deg, #2d3436, #000);
        color: white;
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1rem;
        width: 100%;
        margin-top: 20px;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .btn-update:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        color: #fff;
    }

    .error-message {
        color: #E6120E;
        font-size: 0.85rem;
        display: none;
        background: rgba(230, 18, 14, 0.05);
        padding: 10px;
        border-radius: 8px;
        margin-top: 10px;
        text-align: center;
        font-weight: 500;
    }

    .input-group-text {
        background: transparent;
        border: none;
        color: #b2bec3;
    }
</style>

<div class="container pw-wrapper">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="pw-card">
                <div class="pw-header">
                    <div class="pw-icon-box">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <h3 class="pw-title">Security Settings</h3>
                    <p class="text-muted small">Update your password to keep your account safe</p>
                </div>

                <form method="post" action="" onsubmit="return validatePassword()">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>Old Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control form-control-pw" name="pwd3" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>New Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control form-control-pw" id="newPassword" name="pwd1" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control form-control-pw" id="confirmPassword" name="pwd2" placeholder="••••••••" required>
                        </div>
                        <p class="error-message" id="passwordError">
                            <i class="fas fa-exclamation-circle mr-1"></i> Passwords do not match
                        </p>
                    </div>

                    <button type="submit" class="btn btn-update">
                        Update Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function validatePassword() {
        let newPassword = document.getElementById("newPassword").value;
        let confirmPassword = document.getElementById("confirmPassword").value;
        let errorMessage = document.getElementById("passwordError");

        if (newPassword !== confirmPassword) {
            errorMessage.style.display = "block";
            return false; // Prevent form submission
        }
        return true;
    }
</script>

{% if error == "yes" %}
<script>
    alert('✅ Password Changed Successfully!');
    window.location.href = '{% url "logout" %}';
</script>
{% endif %}

{% if error == "not" %}
<script>
    alert('old password do not match');
</script>
{% endif %}


{% endblock %}
