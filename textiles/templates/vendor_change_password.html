{% extends 'navigation.html' %}
{% block body %}
{% load static %}

<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.95);
        --main-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    body {
        background-color: #f8f9fa;
    }

    .password-container {
        max-width: 550px;
        margin: 80px auto;
        background: var(--glass-bg);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        border: 1px solid rgba(0,0,0,0.05);
        backdrop-filter: blur(10px);
    }

    .password-header {
        text-align: center;
        margin-bottom: 35px;
    }

    .password-header h2 {
        font-weight: 800;
        background: var(--main-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 26px;
    }

    .form-group label {
        font-weight: 700;
        color: #636e72;
        font-size: 14px;
        margin-bottom: 8px;
        margin-left: 5px;
    }

    .form-control {
        border-radius: 12px !important;
        padding: 12px 15px !important;
        border: 1px solid #dfe6e9 !important;
        height: auto !important;
        transition: 0.3s;
    }

    .form-control:focus {
        border-color: #6c5ce7 !important;
        box-shadow: 0 0 0 0.2rem rgba(108, 92, 231, 0.1) !important;
    }

    .btn-submit {
        background: var(--main-gradient);
        color: white !important;
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-weight: 700;
        font-size: 16px;
        width: 100%;
        margin-top: 20px;
        transition: 0.3s;
        box-shadow: 0 8px 15px rgba(108, 92, 231, 0.2);
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 20px rgba(108, 92, 231, 0.3);
    }

    .security-badge {
        background: rgba(108, 92, 231, 0.1);
        color: #6c5ce7;
        padding: 5px 15px;
        border-radius: 50px;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 10px;
        display: inline-block;
    }
</style>

<div class="container">
    <div class="password-container">
        <div class="password-header">
            <span class="security-badge"><i class="fas fa-user-shield mr-1"></i> Security Center</span>
            <br>
            <h2>Change Password</h2>
        </div>

        <form method="post" action="">
            {% csrf_token %}
            <div class="form-group">
                <label>Old Password</label>
                <input type="password" class="form-control" name="pwd3" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" class="form-control" name="pwd1" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" class="form-control" name="pwd2" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-submit">
                Update Password
            </button>
        </form>
    </div>
</div>

{% if error == "yes" %}
<script>
    alert('Password Changed...');
    window.location.href = '{% url "logout" %}';
</script>
{% endif %}

{% if error == "not" %}
<script>
    alert('New Password and Confirm Password do not match');
</script>
{% endif %}

{% endblock %}
