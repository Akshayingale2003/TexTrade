<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}texTrade{% endblock %}</title>
    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-red: #E6120E;
            --dark-gray: #2d3436;
            --light-bg: #f8f9fa;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        /* Modern Navbar Styling */
        .navbar {
            background: white !important;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 15px 0;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-red) !important;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link {
            font-weight: 500;
            color: var(--dark-gray) !important;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: var(--primary-red) !important;
        }

        /* Content Wrapper */
        .container-main {
            flex: 1;
            padding-top: 30px;
            padding-bottom: 50px;
        }

        /* Modern Footer */
        footer {
            background: var(--dark-gray);
            color: white;
            padding: 40px 0 20px;
            margin-top: auto;
        }

        .footer-logo {
            color: var(--primary-red);
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .footer-links a {
            color: #bdc3c7;
            margin: 0 10px;
            text-decoration: none;
            transition: 0.3s;
        }

        .footer-links a:hover {
            color: white;
        }

        .social-icons i {
            font-size: 1.2rem;
            margin: 0 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .social-icons i:hover {
            color: var(--primary-red);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-microchip"></i> texTrade
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container container-main">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <div class="container text-center">
            <div class="footer-logo">texTrade</div>
            <p class="small text-muted mb-4">Premium Textile Trading Platform</p>
            
            <div class="social-icons mb-4">
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-twitter"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-linkedin-in"></i>
            </div>

            <div class="footer-links mb-3">
                <a href="#">About</a>
                <a href="#">Products</a>
                <a href="#">Contact</a>
            </div>

            <hr style="border-top: 1px solid #444; width: 50%; margin: 20px auto;">
            <p class="small text-muted">© 2024 texTrade. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

</body>
</html>
