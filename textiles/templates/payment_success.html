{% extends 'navigation.html' %}
{% block body %}
<style>
    .success-container {
        max-width: 600px;
        margin: 100px auto;
        text-align: center;
        padding: 50px;
        background: var(--glass-bg);
        border-radius: 30px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        border: 1px solid rgba(255,255,255,0.4);
        backdrop-filter: blur(15px);
    }

    .success-icon {
        width: 100px;
        height: 100px;
        background: #00d084;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 50px;
        margin: 0 auto 30px;
        box-shadow: 0 10px 20px rgba(0, 208, 132, 0.3);
        animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes scaleIn {
        from { transform: scale(0); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    h2 {
        font-weight: 700;
        background: var(--main-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 15px;
    }

    .order-id {
        background: #f1f2f6;
        padding: 8px 20px;
        border-radius: 12px;
        font-weight: 700;
        color: #636e72;
        display: inline-block;
        margin-top: 10px;
    }

    .btn-home {
        margin-top: 35px;
        background: var(--main-gradient);
        color: white !important;
        padding: 12px 35px;
        border-radius: 12px;
        font-weight: 700;
        text-decoration: none;
        display: inline-block;
        transition: 0.3s;
        box-shadow: 0 8px 15px rgba(108, 92, 231, 0.2);
    }

    .btn-home:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 20px rgba(108, 92, 231, 0.3);
    }
</style>

<div class="container">
    <div class="success-container">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        
        <h2>Payment Successful!</h2>
        <p class="text-muted">Thank you for your order. Your transaction has been completed successfully and a receipt has been sent to your email.</p>
        
        <div class="order-id">
            <i class="fas fa-receipt mr-2"></i> Order Confirmed
        </div>

        <div class="d-block">
            <a href="{% url 'home' %}" class="btn-home">
                Return to Shop
            </a>
        </div>
        
        <div class="mt-4">
            <a href="{% url 'view_booking' %}" class="text-primary font-weight-bold" style="text-decoration: none;">
                View My Bookings <i class="fas fa-chevron-right small ml-1"></i>
            </a>
        </div>
    </div>
</div>
{% endblock %}
