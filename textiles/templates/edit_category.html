{% extends 'navigation.html' %}
{% block body %}
{% load static %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
    body {
        background-color: #f4f7f6;
        font-family: 'Poppins', sans-serif;
    }

    .admin-wrapper {
        margin-top: 80px;
        margin-bottom: 60px;
    }

    .edit-card {
        background: #ffffff;
        border-radius: 20px;
        border: none;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        padding: 40px;
        transition: 0.3s;
    }

    .edit-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .edit-icon-box {
        width: 70px;
        height: 70px;
        background: rgba(0, 123, 255, 0.1);
        color: #007bff;
        font-size: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 15px;
        margin: 0 auto 20px;
    }

    .edit-title {
        font-weight: 700;
        color: #2d3436;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-group label {
        font-weight: 600;
        color: #636e72;
        font-size: 0.9rem;
        margin-bottom: 10px;
    }

    .form-control-edit {
        border-radius: 12px;
        padding: 14px 15px;
        border: 2px solid #f1f1f1;
        transition: 0.3s;
        background-color: #fdfdfd;
        font-weight: 500;
    }

    .form-control-edit:focus {
        border-color: #007bff;
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.1);
        background-color: #fff;
    }

    .btn-update-cat {
        background: linear-gradient(135deg, #007bff, #0056b3);
        color: white;
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1rem;
        width: 100%;
        margin-top: 20px;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0, 123, 255, 0.2);
    }

    .btn-update-cat:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 25px rgba(0, 123, 255, 0.3);
        color: #fff;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #b2bec3;
        font-size: 0.9rem;
        text-decoration: none;
        transition: 0.3s;
    }

    .back-link:hover {
        color: #2d3436;
        text-decoration: none;
    }
</style>

<div class="container admin-wrapper">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="edit-card">
                <div class="edit-header">
                    <div class="edit-icon-box">
                        <i class="fas fa-tags"></i>
                    </div>
                    <h3 class="edit-title">Edit Category</h3>
                    <p class="text-muted small">Update the category name in your inventory</p>
                </div>

                <form method="post" action="">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="categoryInput">Category Name</label>
                        <input type="text" class="form-control form-control-edit" id="categoryInput" name="cat" value="{{ category.name }}" required>
                    </div>

                    <button type="submit" class="btn btn-update-cat">
                        <i class="fas fa-save mr-2"></i> Update Category
                    </button>
                    
                    <a href="javascript:history.back()" class="back-link">
                        <i class="fas fa-arrow-left mr-1"></i> Cancel and Go Back
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    {% if error == "no" %}
        alert('✅ Category has been updated successfully!');
        window.location.href = '{% url "edit_category" category.id %}';
    {% endif %}

    {% if error == "yes" %}
        alert('❌ Something went wrong. Please try again.');
    {% endif %}
</script>

{% endblock %}
