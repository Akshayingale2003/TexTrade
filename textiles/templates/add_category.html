{% extends 'navigation.html' %}
{% block body %}
{% load static %}

{% if error %}
<script>
    alert('One New Category Added Successfully');
</script>
{% endif %}

<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.95);
        --main-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --accent-purple: #6c5ce7;
        --text-dark: #2d3436;
    }

    body {
        background-color: #f8f9fa;
        font-family: 'Poppins', sans-serif;
    }

    .form-wrapper {
        margin-top: 80px;
        margin-bottom: 50px;
    }

    .card-glass {
        background: var(--glass-bg);
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        backdrop-filter: blur(10px);
        overflow: hidden;
        transition: transform 0.3s ease;
    }

    .card-glass:hover {
        transform: translateY(-5px);
    }

    .card-header-custom {
        background: var(--main-gradient);
        padding: 30px;
        text-align: center;
        border: none;
    }

    .card-header-custom h3 {
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-size: 1.4rem;
        margin: 0;
        color: white;
    }

    .form-label {
        font-weight: 700;
        color: var(--text-dark);
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
        display: block;
    }

    .form-control-custom {
        border-radius: 12px;
        padding: 14px;
        border: 1px solid #dfe6e9;
        background: #fdfdff;
        transition: 0.3s ease;
    }

    .form-control-custom:focus {
        border-color: var(--accent-purple);
        box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1);
        outline: none;
    }

    .btn-submit-purple {
        background: var(--main-gradient);
        border: none;
        padding: 15px;
        font-weight: 700;
        border-radius: 12px;
        transition: 0.3s;
        color: white !important;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
    }

    .btn-submit-purple:hover {
        transform: scale(1.02);
        box-shadow: 0 12px 25px rgba(108, 92, 231, 0.4);
    }

    .icon-box {
        color: var(--accent-purple);
        margin-right: 8px;
    }
</style>

<div class="container form-wrapper">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card-glass shadow-lg">
                <div class="card-header-custom">
                    <h3><i class="fas fa-folder-plus mr-2"></i>New Category</h3>
                </div>
                <div class="card-body p-4 p-lg-5">
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group mb-4">
                            <label for="categoryName" class="form-label">
                                <i class="fas fa-tag icon-box"></i>Category Name
                            </label>
                            <input type="text" 
                                   class="form-control form-control-custom" 
                                   id="categoryName" 
                                   name="cat" 
                                   placeholder="e.g. Cotton, Silk, Premium Saree" 
                                   required>
                        </div>
                        
                        <button type="submit" class="btn btn-submit-purple btn-block">
                            Confirm and Add
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a href="{% url 'view_categary' %}" class="small text-muted" style="text-decoration: none;">
                            <i class="fas fa-arrow-left mr-1"></i> Back to Category List
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
