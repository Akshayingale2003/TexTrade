{% extends 'navigation.html' %}
{% block body %}
{% load static %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.95);
        --main-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    body {
        background-color: #f8f9fa;
        font-family: 'Poppins', sans-serif;
    }

    .profile-wrapper {
        margin-top: 60px;
        margin-bottom: 60px;
    }

    .profile-card {
        background: var(--glass-bg);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        border: 1px solid rgba(0,0,0,0.05);
        backdrop-filter: blur(10px);
    }

    .profile-header {
        text-align: center;
        margin-bottom: 35px;
    }

    .profile-header h2 {
        font-weight: 800;
        background: var(--main-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-section-title {
        font-size: 0.85rem;
        font-weight: 700;
        color: #6c5ce7;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 2px solid #f1f2f6;
        padding-bottom: 5px;
    }

    .form-group label {
        font-weight: 600;
        color: #636e72;
        font-size: 0.85rem;
        margin-bottom: 8px;
    }

    /* Readonly style */
    .form-control-readonly {
        background-color: #f8f9fa !important;
        border: 1px solid #e9ecef;
        color: #adb5bd;
        cursor: not-allowed;
    }

    .form-control-edit {
        border-radius: 12px;
        padding: 12px 15px;
        border: 1px solid #e0e0e0;
        transition: 0.3s;
        font-weight: 500;
        background-color: #fcfcfc;
    }

    .form-control-edit:focus {
        border-color: #6c5ce7;
        box-shadow: 0 0 0 0.2rem rgba(108, 92, 231, 0.1);
        background-color: #fff;
    }

    .profile-img-preview {
        width: 140px;
        height: 140px;
        object-fit: cover;
        border-radius: 20px; /* Modern rounded square for vendors */
        border: 4px solid #fff;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .btn-update-profile {
        background: var(--main-gradient);
        color: white !important;
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1rem;
        width: 100%;
        margin-top: 20px;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-update-profile:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
    }
</style>

<div class="container profile-wrapper">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="profile-card">
                <div class="profile-header">
                    <h2>Vendor Profile</h2>
                    <p class="text-muted small">Update your business profile and contact information</p>
                </div>

                <form method="post" action="" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="form-section-title">Business Account </div>
                    <div class="row">
                        <div class="col-md-3 form-group">
                            <label>First Name</label>
                            <input type="text" class="form-control form-control-edit form-control" value="{{ pro.user.first_name }}" name="fname">
                        </div>
                        <div class="col-md-3 form-group">
                            <label>Last Name</label>
                            <input type="text" class="form-control form-control-edit form-control" name="lname" value="{{ pro.user.last_name }}" >
                        </div>
                        <div class="col-md-3 form-group">
                            <label>Username</label>
                            <input type="text" class="form-control form-control-edit form-control" name="uname" value="{{ pro.user.username }}" >
                        </div>
                        <div class="col-md-3 form-group">
                            <label>Email Address</label>
                            <input type="email" class="form-control form-control-edit form-control" name="email" value="{{ pro.user.email }}" >
                        </div>
                    </div>

                    <div class="form-section-title mt-4">Operational Details</div>
                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label><i class="fas fa-phone mr-1"></i> Support Contact</label>
                            <input type="text" class="form-control form-control-edit" name="contact" value="{{ pro.contact }}" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt mr-1"></i> Office/Store Address</label>
                        <input type="text" class="form-control form-control-edit" name="address" value="{{ pro.address }}" required>
                    </div>

                    <div class="row align-items-center mt-4">
                        <div class="col-md-8 form-group">
                            <label><i class="fas fa-camera mr-1"></i> Vendor Branding / Profile Image</label>
                            <input type="file" class="form-control form-control-edit" name="img" onchange="previewImage(event)">
                            <small class="text-muted d-block mt-2">Visible to customers on your products</small>
                        </div>
                        <div class="col-md-4 text-center">
                            <div class="current-img-box">
                                {% if pro.image %}
                                    <img src="{{ pro.image.url }}" id="imagePreview" class="profile-img-preview">
                                {% else %}
                                    <img src="{% static 'images/default-vendor.png' %}" id="imagePreview" class="profile-img-preview">
                                {% endif %}
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-update-profile">
                        <i class="fas fa-check-circle mr-2"></i> Update Vendor Profile
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    {% if error %}
        alert('vendors Profile updated successfully!');
    {% endif %}

    function previewImage(event) {
        var reader = new FileReader();
        reader.onload = function(){
            var output = document.getElementById('imagePreview');
            output.src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>

{% endblock %}
