{% extends 'navigation.html' %}
{% block body %}
{% load static %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
    body {
        background-color: #f4f7f6;
        font-family: 'Poppins', sans-serif;
    }

    .profile-wrapper {
        margin-top: 60px;
        margin-bottom: 60px;
    }

    .profile-card {
        background: #ffffff;
        border-radius: 20px;
        border: none;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        padding: 40px;
    }

    .profile-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .profile-title {
        font-weight: 700;
        color: #2d3436;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-section-title {
        font-size: 0.85rem;
        font-weight: 700;
        color: #E6120E;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 1px solid #eee;
        padding-bottom: 5px;
    }

    .form-group label {
        font-weight: 600;
        color: #636e72;
        font-size: 0.85rem;
        margin-bottom: 8px;
    }

    /* Styles for fields */
    .form-control-readonly {
        background-color: #f8f9fa !important;
        border: 1px solid #e9ecef;
        color: #adb5bd;
        cursor: not-allowed;
    }

    .form-control-edit {
        border-radius: 10px;
        padding: 12px 15px;
        border: 2px solid #f1f1f1;
        transition: 0.3s;
        font-weight: 500;
    }

    .form-control-edit:focus {
        border-color: #E6120E;
        box-shadow: 0 0 0 0.2rem rgba(230, 18, 14, 0.1);
    }

    .profile-img-preview {
        width: 140px;
        height: 140px;
        object-fit: cover;
        border-radius: 50%;
        border: 4px solid #fff;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .btn-update-profile {
        background: linear-gradient(135deg, #E6120E, #c40f0c);
        color: white;
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1rem;
        width: 100%;
        margin-top: 20px;
        transition: 0.3s;
    }

    .btn-update-profile:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(230, 18, 14, 0.2);
        color: #fff;
    }
</style>

<div class="container profile-wrapper">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="profile-card">
                <div class="profile-header">
                    <h3 class="profile-title">Update Your Profile</h3>
                    <p class="text-muted small">Account settings and personal information</p>
                </div>

                <form method="post" action="" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="form-section-title">Identity & Account</div>
                    <div class="row">
                        <div class="col-md-4 form-group">
                            <label>First Name</label>
                            <input type="text" class="form-control form-control-edit" value="{{ pro.user.first_name }}" name="fname" required>
                        </div>
                        <div class="col-md-4 form-group">
                            <label>Last Name</label>
                            <input type="text" class="form-control form-control-edit" name="lname" value="{{ pro.user.last_name }}" required>
                        </div>
                        <div class="col-md-4 form-group">
                            <label>Username (Locked)</label>
                            <input type="text" class="form-control form-control-edit form-control-readonly" name="uname" value="{{ pro.user.username }}" readonly>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12 form-group">
                            <label>Email Address (Locked)</label>
                            <input type="email" class="form-control form-control-edit form-control-readonly" name="email" value="{{ pro.user.email }}" readonly>
                        </div>
                    </div>

                    <div class="form-section-title mt-4">Personal Details</div>
                    <div class="row">
                        <div class="col-md-4 form-group">
                            <label><i class="fas fa-city mr-1"></i> City</label>
                            <input type="text" class="form-control form-control-edit" name="city" value="{{ pro.city }}" required>
                        </div>
                        <div class="col-md-4 form-group">
                            <label><i class="fas fa-phone mr-1"></i> Contact Number</label>
                            <input type="text" class="form-control form-control-edit" name="contact" value="{{ pro.contact }}" required>
                        </div>
                        <div class="col-md-4 form-group">
                            <label><i class="fas fa-calendar-alt mr-1"></i> Date of Birth</label>
                            <input type="date" class="form-control form-control-edit" name="date" value="{{ pro.dob|date:'Y-m-d' }}" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt mr-1"></i> Address</label>
                        <input type="text" class="form-control form-control-edit" name="add" value="{{ pro.address }}" required>
                    </div>

                    <div class="row align-items-center mt-4">
                        <div class="col-md-8 form-group">
                            <label><i class="fas fa-camera mr-1"></i> Profile Picture</label>
                            <input type="file" class="form-control form-control-edit" name="img" onchange="previewImage(event)">
                            <small class="text-muted d-block mt-2">Recommended: Square image, max 2MB</small>
                        </div>
                        <div class="col-md-4 text-center">
                            <div class="current-img-box">
                                {% if pro.image %}
                                    <img src="{{ pro.image.url }}" id="imagePreview" class="profile-img-preview">
                                {% else %}
                                    <img src="{% static 'images/default-profile.png' %}" id="imagePreview" class="profile-img-preview">
                                {% endif %}
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-update-profile">
                        <i class="fas fa-save mr-2"></i> Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    {% if error %}
        window.location.href = "{% url 'profile' %}";
    {% endif %}

    function previewImage(event) {
        var reader = new FileReader();
        reader.onload = function(){
            var output = document.getElementById('imagePreview');
            output.src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>

{% endblock %}
