{% extends 'navigation.html' %}
{% load static %}
{% block body %}

<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.95);
        --danger-gradient: linear-gradient(135deg, #ff7675 0%, #d63031 100%);
        --text-dark: #2d3436;
    }

    body {
        background-color: #f8f9fa;
        font-family: 'Poppins', sans-serif;
    }

    .password-card {
        background: var(--glass-bg);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(214, 48, 49, 0.1);
        border: 1px solid rgba(0,0,0,0.05);
        margin-top: 80px;
        backdrop-filter: blur(10px);
    }

    .header-icon {
        width: 70px;
        height: 70px;
        background: var(--danger-gradient);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        margin: 0 auto 20px;
        box-shadow: 0 10px 20px rgba(214, 48, 49, 0.2);
    }

    .title {
        text-align: center;
        font-weight: 800;
        color: var(--text-dark);
        margin-bottom: 30px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        font-weight: 700;
        color: #636e72;
        font-size: 12px;
        text-transform: uppercase;
    }

    .form-control {
        border-radius: 12px;
        padding: 12px 15px;
        border: 1px solid #dfe6e9;
    }

    .btn-update {
        background: var(--danger-gradient);
        color: white !important;
        border: none;
        border-radius: 12px;
        padding: 15px;
        font-weight: 700;
        text-transform: uppercase;
        width: 100%;
        margin-top: 10px;
        transition: 0.3s;
    }

    .btn-update:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(214, 48, 49, 0.3);
    }
</style>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-8">
            <div class="password-card">
                <div class="header-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h3 class="title">Security Settings</h3>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label class="form-label">Current Password</label>
                        <input type="password" name="old" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input type="password" name="new" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" name="confirm" class="form-control" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-update">
                        Update Security Credentials
                    </button>
                    
                    <div class="text-center mt-4">
                        <a href="{% url 'admin_profile' %}" class="text-muted small" style="text-decoration:none;">
                            <i class="fas fa-arrow-left mr-1"></i> Back to Profile
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% if error == "no" %}
<script>
    alert('Password Changed Successfully');
    window.location = "{% url 'admin_profile' %}";
</script>
{% endif %}

{% if error == "yes" %}
<script>
    alert('Invalid Current Password or New Passwords do not match');
</script>
{% endif %}

{% endblock %}
